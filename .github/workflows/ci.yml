name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit and smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"

      - name: Lint source and tests
        run: python -m ruff check src tests

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke import FastAPI app
        run: python -c "from api.main import app; print(app.title)"

      - name: Import every backend module
        run: python -m pytest tests/test_module_hygiene.py -q

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag bazaar-mind-games:ci .

      - name: Smoke import app inside Docker image
        run: docker run --rm bazaar-mind-games:ci python -c "from api.main import app; print(app.title)"
