services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m streamlit run src/dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cpr-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m services.cpr_scheduler
    restart: unless-stopped
